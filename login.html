<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="/style.css">
  <script
  src="https://challenges.cloudflare.com/turnstile/v0/api.js"
  async
  defer
></script>
</head>
<body style="background:black; color:white; text-align:center; font-family:Lucida Sans Unicode, sans-serif;">
  <form action="/login" method="POST">
  <div class="topbar">
  <div class="left">
    <img src="images/favicon.png" class="logo">
    <span class="title">WSC</span>
  </div>

  <div class="right">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="login.html">Login</a>
    <a href="https://wscofficial.github.io/TexScript">TexScript</a>
  </div>
</div>


  <p>Powered by</p>  <img src="images/supabase-logo-icon.png" alt="Supabase">
  
  <h1>Login</h1>

  <input id="email" type="email" placeholder="Email">
  <br>
  <input id="password" type="password" placeholder="Password">
  <br><br>
<div
  class="cf-turnstile"
  data-sitekey="<0x4AAAAAADDpnVscbX6sJT_4>"
  data-theme="light"
  data-size="normal"
  data-callback="verified"
></div>

  <button id="loginBtn">Login</button>
  <button id="signupBtn">Sign Up</button>

  <script type="module">
    import { supabase } from "./auth.js";

    const email = document.getElementById("email");
    const password = document.getElementById("password");

    document.getElementById("loginBtn").onclick = async () => {
      const { error } = await supabase.auth.signInWithPassword({
        email: email.value,
        password: password.value
      });

      if (error) {
        alert(error.message);
        return;
      }

      window.location.href = "https://wscofficial.github.io/dashboard.html";
    };

    document.getElementById("signupBtn").onclick = async () => {
      const { error } = await supabase.auth.signUp({
        email: email.value,
        password: password.value
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Check your email to confirm your account");
    };
  </script>

</body>
</html>
